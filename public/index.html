<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#5BA4E0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MathBrick" />
    <meta name="description" content="Česká vzdělávací hra s násobilkou pro děti 6–10 let." />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>MathBrick</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body { margin: 0; overscroll-behavior: none; }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #D6EEFF;
        font-family: 'Segoe UI', 'Nunito', system-ui, sans-serif;
        gap: 12px;
      }

      #boot-splash img {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        box-shadow: 0 6px 24px rgba(91, 164, 224, 0.3);
      }

      #boot-splash .title {
        font-size: 32px;
        line-height: 1;
        margin: 0;
      }

      #boot-splash .title .math {
        color: #2E4A6B;
        font-weight: 900;
      }

      #boot-splash .title .brick {
        color: #5A7FA8;
        font-weight: 400;
      }

      #boot-splash .subtitle {
        font-size: 13px;
        font-weight: 700;
        color: #5BA4E0;
        letter-spacing: 1px;
        text-transform: uppercase;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        border-right: 2px solid #5BA4E0;
        animation:
          typing 1.4s steps(15, end) 0.5s forwards,
          blink 0.6s step-end 0.5s 4;
      }

      @keyframes typing {
        from { width: 0; }
        to   { width: 10em; }
      }

      @keyframes blink {
        50% { border-color: transparent; }
      }
    </style>
  </head>
  <body>
    <noscript>Pro spuštění aplikace je potřeba JavaScript.</noscript>

    <div id="boot-splash">
      <img src="/icon-192.png" alt="MathBrick" />
      <div class="title">
        <span class="math">Math</span><span class="brick">Brick</span>
      </div>
      <div class="subtitle">Počítej&nbsp;a&nbsp;stav</div>
    </div>

    <div id="root"></div>
  </body>
</html>
