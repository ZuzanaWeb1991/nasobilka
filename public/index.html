<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#5BA4E0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MathBrick" />
    <meta name="description" content="Procvičuj násobilku a dělení stavěním domečku!" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <title>MathBrick</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; overscroll-behavior: none; }
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #D3ECCF;
        font-family: 'Segoe UI', 'Nunito', system-ui, sans-serif;
      }
      #boot-splash .logo { font-size: 56px; margin-bottom: 8px; }
      #boot-splash .title { font-size: 28px; font-weight: 900; color: #2E4A6B; letter-spacing: -0.5px; }
    </style>
  </head>
  <body>
    <noscript>Pro spuštění aplikace je potřeba JavaScript.</noscript>
    <div id="boot-splash">
      <div class="logo">🧱</div>
      <div class="title">MathBrick</div>
    </div>
    <div id="root"></div>
  </body>
</html>
